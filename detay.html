<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proje Detayı | Affresco Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div id="content" style="opacity: 0;">
        <nav>
            <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">AFFRESCO <span>STUDIO</span></div>
            <ul>
                <li><a href="index.html#koleksiyon">Koleksiyona Dön</a></li>
            </ul>
        </nav>

        <section class="project-detail-section section-padding">
            <div class="detail-container">
                <div class="detail-img-box">
                    <img id="project-img-tag" src="" alt="Proje Görseli">
                </div>
                <div class="detail-info-box">
                    <h1 id="project-title">Proje Yükleniyor...</h1>
                    <div class="info-item">
                        <h3>Kullanılan Malzemeler</h3>
                        <p id="project-materials">-</p>
                    </div>
                    <div class="info-item">
                        <h3>Yapım Aşaması / Hikayesi</h3>
                        <p id="project-process">-</p>
                    </div>
                    <a href="index.html#koleksiyon" class="btn">Geri Dön</a>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Tüm Projelerin Veri Havuzu
        const projects = {
            "1": {
                title: "Klasik Affresco",
                img: "resimler/duvar1.jpg",
                materials: "Kireç esaslı sıva, doğal pigmentler, koruyucu vaks.",
                process: "Geleneksel İtalyan tekniklerine sadık kalınarak katman katman uygulanan klasik doku çalışması."
            },
            "2": {
                title: "Modern Sanat",
                img: "resimler/duvar2.jpg",
                materials: "Akrilik efekt boyası, ince kumlu tekstür.",
                process: "Minimalist mekanlar için tasarlanmış, ışık açısına göre renk değiştiren modern yüzey tasarımı."
            },
            "3": {
                title: "Antik Doku",
                img: "resimler/duvar3.jpg",
                materials: "Eskitme patinaları, kaba dokulu harç.",
                process: "Yılların yaşanmışlık hissini duvara aktarmak amacıyla derin çatlaklar ve eskitme efektleri içeren özel çalışma."
            },
            "4": {
                title: "Rölyef ve Sanat",
                img: "resimler/duvar4.jpg",
                materials: "Akrilik, Özel Alçı, İç Yapı Armatürü",
                process: "Mekana özel hazırlanan rölyef tasarımı ve yüksek kabartma duvar uygulaması."
            },
            "5": {
                title: "Altın Dokunuşlar",
                img: "resimler/duvar5.jpg",
                materials: "İtalyan Sıva, Altın Varak",
                process: "Katmanlı İtalyan sıva üzerine altın varak detaylarla derinlik kazandırılması."
            },
            "6": {
                title: "Mural Tasarımı",
                img: "resimler/duvar6.jpg",
                materials: "Duvar Boyası, Akrilik",
                process: "Duvar yüzeyine doğrudan uygulanan el yapımı sanatsal mural çizimi."
            },
            "7": {
                title: "Doku Harmonisi",
                img: "resimler/duvar7.jpg",
                materials: "Tekstürlü Sıva, Efekt Boya",
                process: "Yaşam alanlarına karakter katan modern ve yoğun dokulu yüzey çalışması."
            }
        };

        // URL'den hangi projenin istendiğini bulma (örn: detay.html?id=4)
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        const project = projects[projectId];

        if(project) {
            // Verileri HTML elementlerine yerleştirme
            document.getElementById('project-img-tag').src = project.img;
            document.getElementById('project-img-tag').alt = project.title;
            document.getElementById('project-title').innerText = project.title;
            document.getElementById('project-materials').innerText = project.materials;
            document.getElementById('project-process').innerText = project.process;
        } else {
            document.getElementById('project-title').innerText = "Proje Bulunamadı";
        }

        // Sayfa Yüklenme Animasyon Kontrolü
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('content').style.opacity = '1';
                }, 800);
            }, 500);
        };
    </script>
</body>
</html>
